<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
  <title>Игра MEMO</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/media.css">

  <script src="js/memo.js"></script>
  <script defer src="js/script.js"></script>
</head>

<body>

  <main class="game">

    <div class="game">
      <div class="container">
        <h1 class="game__caption">Игра MEMO</h1>
        <div class="row justify-content-between align-items-center game__info">
          <div class="col-12 col-lg-6 game__player--active">Игрок 1</div>
          <div class="col-12 col-lg-6 game__time--left"></div>
        </div>
        <div class="d-flex justify-content-center game__buttons">
          <button class="game__btn--restart display-hidden" id="restart">Сыграть еще раз</button>
        </div>
        <div class="row justify-content-center game__cards"></div>
      </div>
    </div>
  </main>

</body>

</html>
